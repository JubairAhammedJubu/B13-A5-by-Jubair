<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker</title>

    <!-- tailwind-daisyui -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- icon -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        font-family: "Geist", sans-serif;
      }
    </style>
  </head>

  <body class="flex items-center justify-center min-h-screen bg-gray-50 md:py-14">
    <div class="card w-[520px] bg-white shadow-md p-8">
      <!-- GitHub Icon -->
      <div class="flex justify-center mb-6">
        <img src="assets/github-logo.png" alt=""class="h-24 w-24" />
      </div>
      <h1 class="text-xl md:text-2xl font-bold text-center">GitHub Issues Tracker</h1>

      <p class="text-center text-gray-500 mb-6">
        Sign in to manage your issues
      </p>

      <!-- Username -->
      <label class="label font-semibold text-gray-800 mb-2">Username</label>
      <input
        id="username"
        type="text"
        placeholder="Enter Username"
        class="input input-bordered w-full rounded-lg mb-1"
      />

      <p class="text-xs text-purple-800 mb-4">Default: admin</p>

      <!-- Password -->
      <label class="label font-semibold text-gray-800 mb-2">Password</label>
      <input
        id="password"
        type="password"
        placeholder="Enter Password"
        class="input input-bordered w-full rounded-lg mb-1"
      />

      <p class="text-xs mb-6 text-purple-800">Default: admin123</p>

      <!-- Button -->
      <button
        onclick="login()"
        class="w-full p-4 rounded-lg text-white font-semibold bg-blue-700 hover:opacity-80"
      >
        Sign In
      </button>  

      <!-- Divider -->
      <div class="divider my-6 text-black">OR</div>

      <!-- Demo Credentials -->
      <p class="text-gray-500 text-center mb-2">Demo Credentials:</p>
      <div class="bg-gray-100 rounded-lg p-4 text-center text-sm">
        <p><b>Username:</b> admin</p>
        <p><b>Password:</b> admin123</p>
      </div>
    </div>

    <script src="js/login.js"></script>
  </body>
</html>
