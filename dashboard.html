<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker | Dashboard</title>

    <!-- tailwind-daisyui -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- icon -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        font-family: "Geist", sans-serif;
      }
    </style>
  </head>

  <body>
    <nav class="navbar w-[1600px] px-20 m-auto bg-base-100 shadow-sm">
      <div class="flex-1 flex items-center gap-2">
        
        <div class="avatar">
          <div class="w-10 rounded-full">
            <img src="assets/github-logo.png" />
          </div>
        </div>

        <p class="text-2xl font-semibold text-gray-800">
          GitHub Issues Tracker
        </p>
      </div>

      <div class="flex gap-2">
        <input
          type="text"
          placeholder="Search issues..."
          class="input input-bordered w-24 md:w-auto"
        />
        <button class="btn btn-primary hover:opacity-80">
          <i class="fa-solid fa-plus"></i>New Issue
        </button>
      </div>
    </nav>

        <section class="w-[1110px] m-auto my-14" >
    <!-- Filters -->
    <div class="p-6 lg:text-left text-center space-x-4 shadow-[0_0_10px_rgba(0,0,0,0.1)] rounded-lg">
      <button
        onclick="loadIssues('all')"
        class="bg-blue-700 border border-gray-200 text-white h-10 w-30 text-sm rounded-sm cursor-pointer"
      >
        All
      </button>
      <button
        onclick="loadIssues('open')"
        class="bg-white border border-gray-200 h-10 w-30 text-sm rounded-sm cursor-pointer hover:text-blue-600"
        
      >
        Open
      </button>
      <button
        onclick="loadIssues('closed')"
        class="bg-white border border-gray-200 h-10 w-30 text-sm rounded-sm cursor-pointer hover:text-blue-600"
        id="rejected-filter-btn"
      >
        Closed
      </button>
    </div>
    </section>
  </body>
</html>
